    <div class="container my-5">
        <div id="productDetail"></div>
    </div>

    <footer class="bg-dark text-white text-center p-3">
        <p>© 2026 AutoParts | Hotline: 0123 456 789</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        fetch('../data/phukien.json')
            .then(response => response.json())
            .then(data => {
                const item = data.find(p => p.id == id);
                if (item) {
                    document.getElementById('productDetail').innerHTML = `
                        <div class="row">
                            <div class="col-md-6">
                                <img src="../img/${item.image}" class="img-fluid" alt="${item.name}">
                            </div>
                            <div class="col-md-6">
                                <h1>${item.name}</h1>
                                <p class="text-muted">${item.description}</p>
                                <h3 class="text-danger">${item.price} đ</h3>
                                <button class="btn btn-success" onclick="addToCart('${item.name}', '${item.price}')">Thêm vào giỏ hàng</button>
                                <a href="phukien_danhsach.html" class="btn btn-primary ms-2">Quay lại danh sách</a>
                            </div>
                        </div>
                    `;
                }
            });

        function addToCart(name, price) {

            let gioHang = JSON.parse(localStorage.getItem("gioHang")) || [];

            let giaSo = parseInt(
                price
                .replace(/\./g, "")
                .replace(/,/g, "")
                .replace(/\s/g, "")
                .replace(/đ|VNĐ|VND/gi, "")
            );

            let viTri = gioHang.findIndex(sp => sp.ten === name);

            if (viTri !== -1) {
                gioHang[viTri].soLuong += 1;
            } else {
                gioHang.push({
                    ten: name,
                    gia: giaSo,
                    soLuong: 1
                });
            }

            localStorage.setItem("gioHang", JSON.stringify(gioHang));
            alert("Đã thêm phụ kiện vào giỏ hàng!");
        }
    </script>
