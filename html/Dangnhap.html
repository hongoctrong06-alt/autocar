<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <title>AutoCar - Đăng nhập</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../html/trangchu.html">AutoCar</a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../html/trangchu.html">Trang chủ</a>
                <a class="nav-link" href="../html/phukien_trangchu.html">Phụ kiện</a>
            </div>
        </div>
    </nav>

    <div id="wrapper">

        <form action="" id="form-login">

            <h1 class="form-heading">Đăng nhập</h1>

            <div class="form-group">
                <i class="far fa-user"></i>
                <input type="text" id="username" class="form-input" placeholder="Tên đăng nhập" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" class="form-input" placeholder="Mật khẩu" required>

                <div class="eye">
                    <i class="far fa-eye"></i>
                </div>
            </div>

            <p id="error" style="color:red; text-align:center;"></p>

            <input type="submit" value="Đăng nhập" class="form-submit">

            <p style="color:#fff; text-align:center; margin-top:15px;">
                Chưa có tài khoản?
                <a href="../html/Dangky.html">Đăng ký</a>
            </p>

        </form>

    </div>

    <footer class="bg-dark text-white text-center p-3">
        <p>© 2026 AutoCar | Hotline: 0123 456 789 |
            <a href="../html/sitemap.html" class="text-light">Sitemap</a>
        </p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="../js/app.js"></script>

    <script>
        document.getElementById("form-login").addEventListener("submit", function(e) {

            e.preventDefault();

            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let error = document.getElementById("error");

            let user = JSON.parse(localStorage.getItem("user"));

            if (user && username === user.username && password === user.password) {

                alert("Đăng nhập thành công!");
                window.location.href = "../html/trangchu.html";

            } else {
                error.innerText = "Sai tên đăng nhập hoặc mật khẩu!";
            }

        });
    </script>

</body>

</html>
