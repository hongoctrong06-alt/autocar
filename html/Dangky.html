    <div id="wrapper">

        <form id="form-register">

            <h1 class="form-heading">Đăng ký</h1>

            <div class="form-group">
                <input type="text" id="username" class="form-input" placeholder="Tên đăng nhập" required>
            </div>

            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder="Email" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Mật khẩu" required>
            </div>

            <div class="form-group">
                <input type="password" id="confirm-password" class="form-input" placeholder="Nhập lại mật khẩu" required>
            </div>

            <p id="error" style="color:red; text-align:center;"></p>

            <input type="submit" value="Đăng ký" class="form-submit">

            <p style="color:#fff; text-align:center; margin-top:15px;">
                Đã có tài khoản?
                <a href="../html/Dangnhap.html">Đăng nhập</a>
            </p>

        </form>

    </div>

    <script>
        document.getElementById("form-register").addEventListener("submit", function(e) {

            e.preventDefault();

            let username = document.getElementById("username").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirm-password").value;
            let error = document.getElementById("error");

            if (password !== confirmPassword) {
                error.innerText = "Mật khẩu xác nhận không trùng khớp!";
                return;
            }

            let user = {
                username: username,
                email: email,
                password: password
            };
            localStorage.setItem("user", JSON.stringify(user));
            error.innerText = "";
            alert("Đăng ký thành công!");
            window.location.href = "../html/Dangnhap.html";
        });
    </script>
