    <div class="container mt-5">
        <h2 class="mb-4 fw-bold">Danh sách xe nổi bật</h2>

        <div class="row g-4" id="productList">
        </div>
    </div>

    <script>
        //file JSON
        fetch('../data/cars.json')
            .then(response => response.json())
            .then(data => {
                const productList = document.getElementById('productList');
                let html = '';

                data.forEach(car => {
                    // Xử lý dữ liệu trống
                    const condition = car.condition || "Đang cập nhật";
                    const fuel = car.fuel || "Đang cập nhật";
                    const transmission = car.transmission || "Đang cập nhật";
                    const location = car.location || "Chưa rõ vị trí";
                    const year = car.year || "No data";

                    html += `
                        <div class="col-12 col-md-6 col-lg-4">
                            <div class="card h-100 shadow-sm border-0 product-card">
                                <img src="../img/${car.image}" class="card-img-top object-fit-cover" alt="${car.name}" style="height: 220px;">
                                
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title text-primary-emphasis fw-bold fs-6" style="min-height: 48px;">${car.name}</h5>
                                    
                                    <div class="row text-secondary mb-3 mt-2 fs-7 gx-2 gy-2">
                                        <div class="col-6 d-flex align-items-center">
                                            <i class="fa-regular fa-calendar me-2"></i> ${year}
                                        </div>
                                        <div class="col-6 d-flex align-items-center">
                                            <i class="fa-solid fa-road me-2"></i> ${condition}
                                        </div>
                                        <div class="col-6 d-flex align-items-center">
                                            <i class="fa-solid fa-gas-pump me-2"></i> ${fuel}
                                        </div>
                                        <div class="col-6 d-flex align-items-center">
                                            <i class="fa-solid fa-gear me-2"></i> ${transmission}
                                        </div>
                                    </div>

                                    <div class="mt-auto">
                                        <h4 class="text-danger fw-bold mb-1">${car.price}</h4>
                                        <small class="text-muted"><i class="fa-solid fa-location-dot me-1"></i> ${location}</small>
                                        <a href="../html/trang${car.id}.html" class="btn btn-primary mt-2">Xem chi tiết</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                productList.innerHTML = html;
            })
            .catch(error => console.error('Lỗi tải dữ liệu:', error));
    </script>

    </footer>
