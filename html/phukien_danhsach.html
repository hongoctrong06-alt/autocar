    <div class="container my-5">
        <h1 class="text-center mb-4">Danh Sách Phụ Kiện</h1>
        <div class="row" id="productList"></div>
    </div>
    <div class="bg-light py-5">
        <div class="container text-center">
            <h2>Về chúng tôi</h2>
            <p>Chúng tôi chuyên cung cấp các dòng xe cao cấp với dịch vụ tốt nhất.</p>
        </div>
    </div>
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>© 2026 AutoParts | Hotline: 0123 456 789</p>
    </footer>

    <script>
        fetch('../data/phukien.json')
            .then(response => response.json())
            .then(data => {
                const productList = document.getElementById('productList');
                let html = '';

                data.forEach(item => {

                    const description = item.description || "Đang cập nhật mô tả";
                    const price = item.price || "Liên hệ";
                    const image = item.image || "default.jpg";
                    const name = item.name || "Tên sản phẩm";
                    const id = item.id || 0;

                    html += `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm border-0 product-card">
                        
                        <img 
                            src="../IMG/${image}" 
                            class="card-img-top object-fit-cover" 
                            alt="${name}" 
                            style="height: 220px;"
                        >
                        
                        <div class="card-body d-flex flex-column">
                            
                            <h5 
                                class="card-title text-primary-emphasis fw-bold fs-6" 
                                style="min-height: 48px;"
                            >
                                ${name}
                            </h5>

                            <div class="mt-auto">
                                
                                <h4 class="text-danger fw-bold mb-2">
                                    ${price} đ
                                </h4>

                                <p class="text-muted">
                                    ${description}
                                </p>

                                <a 
                                    href="phukien_chitiet.html?id=${id}" 
                                    class="btn btn-primary mt-2"
                                >
                                    Xem chi tiết
                                </a>

                            </div>
                        </div>
                    </div>
                </div>
            `;
                });

                productList.innerHTML = html;
            })
            .catch(error => console.error('Lỗi tải dữ liệu:', error));
    </script>
</body>
